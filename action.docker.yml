name: 'The cyclist diary article generator'
description: 'Transform a GitHub issue into a nice article'
inputs:
  github-token:
    description: 'GitHub token'
    required: true
  github-username:
    description: 'Github username'
    required: true
  content-path:
    description: 'Path to the content folder where the maps will be generated'
  full-scan:
    description: 'Generate polylines for ALL GPX files (not just modified ones)'
    required: false
    default: 'false'
  action:
    description: 'Name of the action (if named)'
    required: false
  webp-server-url:
    description: 'URL of the WebP conversion server'
    required: true
  webp-server-api-key:
    description: 'API key for WebP server authentication'
    required: true

runs:
  using: 'docker'
  image: 'docker://ghcr.io/the-cyclist-diary/the-cyclist-diary-editor:main'